# azure-pipelines.yml

trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: IMAGE
    value: 'ghcr.io/miranlfk/git-actions-demo/calculator:latest'
  - name: CONTAINER_NAME
    value: 'calculator'
  - name: HOST_PORT
    value: '8080'

stages:

  # ─────────────────────────────────────────
  # STAGE 1: Validate
  # ─────────────────────────────────────────
  - stage: Validate
    displayName: '🔍 Validate'
    jobs:
      - job: ValidateJob
        displayName: 'Check Prerequisites'
        steps:
          - script: |
              docker --version
              echo "Image target: $(IMAGE)"
            displayName: 'Check Docker is Available'

          - script: |
              docker manifest inspect $(IMAGE)
              echo "✅ Image exists and is accessible"
            displayName: 'Verify Image Exists on Registry'

  # ─────────────────────────────────────────
  # STAGE 2: Pull
  # ─────────────────────────────────────────
  - stage: Pull
    displayName: '📦 Pull'
    dependsOn: Validate
    jobs:
      - job: PullJob
        displayName: 'Pull Docker Image'
        steps:
          - script: |
              docker pull $(IMAGE)
              echo "✅ Image pulled successfully"
            displayName: 'Pull Docker Image'

          - script: |
              docker image inspect $(IMAGE)
            displayName: 'Inspect Image Metadata'

  # ─────────────────────────────────────────
  # STAGE 3: Test
  # ─────────────────────────────────────────
  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Pull
    jobs:
      - job: TestJob
        displayName: 'Smoke Test Image'
        steps:
          - script: |
              docker run --rm --name $(CONTAINER_NAME)-test $(IMAGE) echo "Container boots OK"
              echo "✅ Smoke test passed"
            displayName: 'Smoke Test — Container Starts'

  # ─────────────────────────────────────────
  # STAGE 4: Deploy & Health Check
  # ─────────────────────────────────────────
  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Test
    jobs:
      - job: DeployJob
        displayName: 'Run Container'
        steps:
          - script: |
              docker pull $(IMAGE)
            displayName: 'Pull Latest Image'

          - script: |
              docker stop $(CONTAINER_NAME) || true
              docker rm $(CONTAINER_NAME) || true
            displayName: 'Remove Old Container'

          - script: |
              docker run -d \
                --name $(CONTAINER_NAME) \
                --restart unless-stopped \
                -p $(HOST_PORT):8080 \
                $(IMAGE)
            displayName: 'Start Container'

          - script: |
              sleep 5
              docker ps --filter "name=$(CONTAINER_NAME)" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            displayName: 'Verify Container is Running'

          # ── Health Check steps moved here ──────────
          - script: |
              docker logs $(CONTAINER_NAME) --tail 50
            displayName: 'Tail Container Logs'

          - script: |
              curl -f http://localhost:$(HOST_PORT)/health || echo "⚠️ No health endpoint — check app manually"
            displayName: 'HTTP Health Check'
            continueOnError: true